<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - UMYU BioHub</title>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial;
            background: #0a2e38;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            background: #2ecc71;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .btn-danger { background: #e74c3c; }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav button {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .nav button.active {
            background: #2ecc71;
        }
        .tab { display: none; }
        .tab.active { display: block; }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-box h3 { font-size: 2rem; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 UMYU BioHub Admin</h1>
            <button class="btn" onclick="logout()">Logout</button>
        </div>

        <div class="nav">
            <button id="btnDashboard" onclick="showTab('dashboard')">Dashboard</button>
            <button id="btnMaterials" onclick="showTab('materials')">Materials</button>
            <button id="btnUpload" onclick="showTab('upload')">Upload</button>
            <button id="btnUsers" onclick="showTab('users')">Users</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboardTab" class="tab active">
            <div class="card">
                <h2>Statistics</h2>
                <div class="stats">
                    <div class="stat-box">
                        <h3 id="totalMaterials">0</h3>
                        <p>Total Materials</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="totalUsers">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Materials Tab -->
        <div id="materialsTab" class="tab">
            <div class="card">
                <h2>All Materials</h2>
                <input type="text" id="searchInput" placeholder="Search materials..." style="margin-bottom: 15px;">
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Title</th><th>Course</th><th>Level</th><th>Action</th></tr></thead>
                        <tbody id="materialsList"><tr><td colspan="4">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Upload Tab -->
<div id="uploadTab" class="tab">
    <div class="card">
        <h2>Upload New Material</h2>
        <input type="text" id="title" placeholder="Title *">
        <input type="text" id="course" placeholder="Course Code (e.g., BCH 301) *">
        <select id="level">
            <option value="100">100 Level</option>
            <option value="200">200 Level</option>
            <option value="300">300 Level</option>
            <option value="400">400 Level</option>
            <option value="500">500 Level</option>
        </select>
        <select id="type">
            <option value="lecture_note">Lecture Note</option>
            <option value="past_question">Past Question</option>
            <option value="practical">Practical Manual</option>
            <option value="assignment">Assignment</option>
            <option value="research">Research Material</option>
        </select>
        <textarea id="desc" placeholder="Description" rows="3"></textarea>
        <button class="btn" id="uploadBtnAdmin">Upload Material</button>
        <div id="uploadMsg" style="margin-top: 10px;"></div>
    </div>
</div>
        
        <!-- Users Tab -->
        <div id="usersTab" class="tab">
            <div class="card">
                <h2>Manage Users</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Email</th><th>Name</th><th>Level</th><th>Role</th><th>Action</th></tr></thead>
                        <tbody id="usersList"><tr><td colspan="5">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://psojlbbepzgqlighavti.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_U4ufzD0hkyrXvOJta235rg_jiHOGdWF';
        
        let supabase = null;
        
        // Initialize Supabase
        function initSupabase() {
            const sbLib = window.supabaseJs || window.supabase;
            if (sbLib) {
                supabase = sbLib.createClient(SUPABASE_URL, SUPABASE_KEY);
                console.log('Supabase ready');
                checkAuth();
            } else {
                setTimeout(initSupabase, 500);
            }
        }
        initSupabase();
        
        // Check authentication
        async function checkAuth() {
            const { data } = await supabase.auth.getSession();
            if (!data.session) {
                window.location.href = 'index.html';
                return;
            }
            document.querySelector('.header h1').innerHTML = `🧬 Admin - ${data.session.user.email}`;
            loadStats();
            loadMaterials();
            loadUsers();
        }
        
        // Show tab function
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            // Show selected tab
            document.getElementById(`${tabName}Tab`).classList.add('active');
            // Update button styles
            document.querySelectorAll('.nav button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (tabName === 'dashboard') document.getElementById('btnDashboard').classList.add('active');
            if (tabName === 'materials') document.getElementById('btnMaterials').classList.add('active');
            if (tabName === 'upload') document.getElementById('btnUpload').classList.add('active');
            if (tabName === 'users') document.getElementById('btnUsers').classList.add('active');
        }
        
        // Load statistics
        async function loadStats() {
            try {
                const { data: materials } = await supabase.from('materials').select('*');
                const { data: users } = await supabase.from('profiles').select('*');
                document.getElementById('totalMaterials').textContent = materials?.length || 0;
                document.getElementById('totalUsers').textContent = users?.length || 0;
            } catch(e) { console.error(e); }
        }
        
        // Load materials
        async function loadMaterials() {
            try {
                const { data } = await supabase.from('materials').select('*').order('created_at', { ascending: false });
                const tbody = document.getElementById('materialsList');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No materials found</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(m => `
                    <tr>
                        <td>${m.title || '-'}</td>
                        <td>${m.course_code || '-'}</td>
                        <td>${m.level || '-'}</td>
                        <td><button class="btn-danger" onclick="deleteMaterial('${m.id}')">Delete</button></td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        // Load users
        async function loadUsers() {
            try {
                const { data } = await supabase.from('profiles').select('*');
                const tbody = document.getElementById('usersList');
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No users found</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(u => `
                    <tr>
                        <td>${u.email || '-'}</td>
                        <td>${u.full_name || '-'}</td>
                        <td>${u.level || '-'}</td>
                        <td>${u.role || 'student'}</td>
                        <td><button class="btn" onclick="makeAdmin('${u.id}')">Make Admin</button></td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        // Upload material
        async function uploadMaterial() {
    const title = document.getElementById('title').value;
    const course = document.getElementById('course').value;
    const level = document.getElementById('level').value;
    const type = document.getElementById('type').value;
    const desc = document.getElementById('desc').value;
    
    console.log('Uploading:', {title, course, level, type});
    
    if (!title || !course) {
        document.getElementById('uploadMsg').innerHTML = 'Please fill title and course';
        document.getElementById('uploadMsg').style.color = '#e74c3c';
        return;
    }
    
    try {
        const { data, error } = await supabase.from('materials').insert({
            title: title,
            course_code: course,
            level: level,
            type: type,
            description: desc,
            uploader: 'admin',
            downloads: 0,
            is_approved: true,
            created_at: new Date()
        }).select();
        
        if (error) throw error;
        
        console.log('Upload success:', data);
        document.getElementById('uploadMsg').innerHTML = '✅ Material uploaded successfully!';
        document.getElementById('uploadMsg').style.color = '#2ecc71';
        
        // Clear form
        document.getElementById('title').value = '';
        document.getElementById('course').value = '';
        document.getElementById('desc').value = '';
        
        // Refresh lists
        loadMaterials();
        loadStats();
        
    } catch (error) {
        console.error('Upload error:', error);
        document.getElementById('uploadMsg').innerHTML = '❌ Error: ' + error.message;
        document.getElementById('uploadMsg').style.color = '#e74c3c';
    }
}

       // Upload material from admin panel
document.getElementById('uploadBtnAdmin').onclick = async () => {
    const title = document.getElementById('title').value;
    const course = document.getElementById('course').value;
    const level = document.getElementById('level').value;
    const type = document.getElementById('type').value;
    const desc = document.getElementById('desc').value;
    
    if (!title || !course) {
        document.getElementById('uploadMsg').innerHTML = 'Please fill title and course';
        document.getElementById('uploadMsg').style.color = '#e74c3c';
        return;
    }
    
    document.getElementById('uploadMsg').innerHTML = 'Uploading...';
    document.getElementById('uploadMsg').style.color = '#2ecc71';
    
    try {
        const { error } = await supabase.from('materials').insert({
            title: title,
            course_code: course,
            level: level,
            type: type,
            description: desc,
            uploader: 'admin',
            downloads: 0,
            is_approved: true
        });
        
        if (error) throw error;
        
        document.getElementById('uploadMsg').innerHTML = '✅ Material uploaded successfully!';
        document.getElementById('uploadMsg').style.color = '#2ecc71';
        
        // Clear form
        document.getElementById('title').value = '';
        document.getElementById('course').value = '';
        document.getElementById('desc').value = '';
        
        // Refresh materials list
        loadMaterials();
        loadStats();
        
    } catch (err) {
        document.getElementById('uploadMsg').innerHTML = '❌ Error: ' + err.message;
        document.getElementById('uploadMsg').style.color = '#e74c3c';
    }
}; 
        
        // Delete material
        async function deleteMaterial(id) {
            if (confirm('Delete this material?')) {
                await supabase.from('materials').delete().eq('id', id);
                loadMaterials();
                loadStats();
            }
        }
        
        // Make user admin
        async function makeAdmin(userId) {
            await supabase.from('profiles').update({ role: 'admin' }).eq('id', userId);
            alert('User is now an admin!');
            loadUsers();
        }
        
        // Logout
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }
        
        // Search filter
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#materialsList tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
