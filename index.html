<!DOCTYPE html>
<html>
<head>
    <title>UMYU BioHub</title>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a2e38, #0a1a2e);
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2ecc71;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        .hero {
            text-align: center;
            padding: 8rem 1rem 4rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn {
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin: 0.5rem;
            font-size: 1rem;
        }
        .btn-primary {
            background: #2ecc71;
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #2ecc71;
            color: #2ecc71;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            padding: 2rem;
            border-radius: 20px;
            width: 350px;
            text-align: center;
        }
        .modal-content h2 {
            margin-bottom: 1rem;
            color: #2ecc71;
        }
        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            margin: 0.5rem 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .modal-content button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 1rem;
            background: #2ecc71;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #aaa;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            min-width: 150px;
        }
        .stat-card h3 {
            font-size: 2rem;
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🧬 UMYU BioHub</div>
        <div>
            <a href="#" class="nav-link" id="loginNavBtn">Login</a>
        </div>
    </div>

    <div class="hero">
        <h1>Biochemistry Digital Library</h1>
        <p>Access lecture notes, past questions, research materials, and more for all levels</p>
        <div>
            <button class="btn btn-primary" id="getStartedBtn">Get Started</button>
            <button class="btn btn-outline">Explore Materials</button>
        </div>
        <div class="stats">
            <div class="stat-card">
                <h3>2,500+</h3>
                <p>Academic Materials</p>
            </div>
            <div class="stat-card">
                <h3>3,200+</h3>
                <p>Active Students</p>
            </div>
            <div class="stat-card">
                <h3>45+</h3>
                <p>Course Modules</p>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLoginModal()">&times;</span>
            <h2>🔐 Login</h2>
            <input type="email" id="loginEmail" placeholder="University Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginSubmitBtn">Login</button>
            <p style="margin-top: 1rem;">Don't have an account? <a href="#" style="color:#2ecc71;">Sign Up</a></p>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://psojlbbepzgqlighavti.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_U4ufzD0hkyrXvOJta235rg_jiHOGdWF';
        
        let supabaseClient = null;
        
        // Initialize Supabase
        function initSupabase() {
            if (typeof supabaseJs !== 'undefined') {
                supabaseClient = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase connected');
            } else {
                setTimeout(initSupabase, 500);
            }
        }
        initSupabase();
        
        // Modal functions
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        // Login function
        async function handleLogin() {
            if (!supabaseClient) {
                alert('Connecting to server...');
                return;
            }
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                alert('Login successful! Redirecting...');
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Button click handlers
        document.getElementById('getStartedBtn').onclick = showLoginModal;
        document.getElementById('loginNavBtn').onclick = showLoginModal;
        document.getElementById('loginSubmitBtn').onclick = handleLogin;
        
        // Close modal when clicking outside
        window.onclick = function(e) {
            if (e.target.classList.contains('modal')) {
                closeLoginModal();
            }
        };
    </script>
</body>
</html>
